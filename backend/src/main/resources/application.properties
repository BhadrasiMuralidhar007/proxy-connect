spring.application.name=proximity-connect

# --- Dev DB (H2, in-memory). Swap for Postgres in prod (see application-prod.properties) ---
spring.datasource.url=jdbc:h2:mem:proximitydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# TEMP: shows exactly which filter/rule is rejecting a request and why.
# Safe to remove once the 403 is diagnosed - it's noisy for normal use.
logging.level.org.springframework.security=DEBUG

# JWT
app.jwt.secret=change-this-to-a-long-random-secret-before-deploying
app.jwt.expiration-ms=86400000

# Default discovery radius in kilometers if the client doesn't specify one
app.discovery.default-radius-km=25
