spring.application.name=proximity-connect

# All values come from environment variables at deploy time - nothing
# secret is hardcoded here. Your hosting platform sets these (Render,
# Railway, Fly.io, etc. all have a place to set env vars per service).
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# "update" auto-creates/updates tables from your entities - fine to start.
# Once you have real user data, switch to a migration tool (Flyway/Liquibase)
# instead, so schema changes are explicit and reviewable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.discovery.default-radius-km=${DEFAULT_RADIUS_KM:25}

# Comma-separated list of your real frontend domain(s), e.g.:
# https://proximity-connect.vercel.app,https://www.yourdomain.com
app.allowed-origins=${ALLOWED_ORIGINS}
